  <text x="52" y="35" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="700" fill="#0a0a0a" letter-spacing="-0.5">BizShot<tspan font-weight="600" fill="#525252" font-size="18">: AI Headshot Pro</tspan></text>
