<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized headshot silhouette with camera shutter -->
  <circle cx="24" cy="16" r="10" fill="none" stroke="url(#logo-grad)" stroke-width="2.5"/>
  <circle cx="24" cy="14" r="5" fill="url(#logo-grad)" opacity="0.7"/>
  <path d="M8 44 Q8 24 24 24 Q40 24 40 44" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Camera shutter ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.15"/>
  <circle cx="24" cy="24" r="14" fill="none" stroke="url(#logo-grad)" stroke-width="1" opacity="0.1"/>

  <!-- Text: BizShot -->
  <text x="56" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#0a0a0a" letter-spacing="-0.5">Biz<span fill="#2563eb">Shot</span></text>

  <!-- Subtitle -->
  <text x="56" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" font-weight="500" fill="#737373" letter-spacing="1.5">AI HEADSHOT PRO</text>
</svg>
