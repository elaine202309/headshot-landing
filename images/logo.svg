<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 48" width="360" height="48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Distinctive icon: stylized portrait-aperture mark -->
  <!-- Outer ring: camera aperture -->
  <circle cx="20" cy="24" r="18" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Inner head circle -->
  <circle cx="20" cy="17" r="7" fill="url(#g)"/>
  <!-- Shoulders: clean geometric curve -->
  <path d="M3 44 Q3 27 20 27 Q37 27 37 44" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Aperture blade accent lines -->
  <line x1="7" y1="11" x2="13" y2="17" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="33" y1="11" x2="27" y2="17" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Text -->
  <text x="52" y="35" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="700" fill="#0a0a0a" letter-spacing="-0.5">BizShot<tspan font-weight="600" fill="#525252" font-size="18">: AI Headshot Pro</tspan></text>
</svg>
